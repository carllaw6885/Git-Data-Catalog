name: Publish CLI Tool

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (e.g. 1.2.3)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [[ -z "$VERSION" ]]; then
            echo "Version cannot be empty."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing GitCatalog.Cli version: $VERSION"

      - name: Restore
        run: dotnet restore GitCatalog.sln

      - name: Build
        run: dotnet build GitCatalog.sln --no-restore -c Release

      - name: Test
        run: dotnet test GitCatalog.sln --no-build -c Release

      - name: Pack .NET tool
        run: |
          dotnet pack src/GitCatalog.Cli/GitCatalog.Cli.csproj \
            -c Release \
            -o ./artifacts \
            -p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate
